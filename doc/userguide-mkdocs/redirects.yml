# Robot Framework User Guide - Legacy URL Redirect Mappings
# ============================================================================
#
# This file documents the comprehensive mapping from legacy single-page URLs
# to the new multi-page MkDocs structure.
#
# LEGACY URL FORMAT:
#   robotframework.org/robotframework/latest/RobotFrameworkUserGuide.html#AnchorName
#
# NEW URL FORMAT:
#   robotframework.org/robotframework/latest/section/page/
#   robotframework.org/robotframework/latest/section/page/#anchor
#
# IMPLEMENTATION STRATEGY:
# ------------------------
# 1. Server-side redirects (nginx/apache) for base document
# 2. JavaScript-based redirects for fragment identifiers (#anchors)
# 3. HTML anchor aliases in markdown for direct linking
#
# The mkdocs-redirects plugin handles full-path redirects.
# The legacy-redirects.js script handles fragment-to-page mapping.
#
# ============================================================================

# =============================================================================
# SECTION: GETTING STARTED
# =============================================================================

