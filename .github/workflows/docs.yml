name: Deploy Documentation

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
    paths:
      - 'doc/userguide-mkdocs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., 7.0)'
        required: false
        type: string
      alias:
        description: 'Alias for the version (e.g., latest)'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        working-directory: doc/userguide-mkdocs
        run: uv sync

      - name: Build docs (PR only)
        if: github.event_name == 'pull_request'
        working-directory: doc/userguide-mkdocs
        run: uv run mkdocs build --strict

      - name: Upload build artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          path: doc/userguide-mkdocs/site/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        working-directory: doc/userguide-mkdocs
        run: uv sync

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # Manual workflow dispatch
            VERSION="${{ inputs.version }}"
            ALIAS="${{ inputs.alias }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag push - extract version from tag
            VERSION="${GITHUB_REF#refs/tags/v}"
            # Set latest alias for new releases
            ALIAS="latest"
          else
            # Branch push - use 'dev' version
            VERSION="dev"
            ALIAS=""
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "alias=$ALIAS" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION (alias: $ALIAS)"

      - name: Deploy docs with mike
        working-directory: doc/userguide-mkdocs
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ALIAS="${{ steps.version.outputs.alias }}"

          if [ -n "$ALIAS" ]; then
            uv run mike deploy --push --update-aliases "$VERSION" "$ALIAS"
          else
            uv run mike deploy --push "$VERSION"
          fi

      - name: Set default version
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: doc/userguide-mkdocs
        run: |
          uv run mike set-default --push latest

      - name: List deployed versions
        working-directory: doc/userguide-mkdocs
        run: uv run mike list
